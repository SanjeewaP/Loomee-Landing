<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Loomeé VTO</title>
    <script>
      // GitHub Pages SPA redirect trick.
      // Stores the intended path in sessionStorage then redirects to /,
      // where index.html will restore it via history.replaceState.
      var path = window.location.pathname + window.location.search + window.location.hash;
      sessionStorage.setItem('__spa_redirect', path);
      window.location.replace('/');
    </script>
  </head>
  <body></body>
</html>
